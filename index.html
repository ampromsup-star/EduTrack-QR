<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EduTrack</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  font-family: 'Sarabun', sans-serif;
  background: linear-gradient(135deg,#f0f4ff,#ffffff);
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div class="w-full max-w-md p-6">

  <!-- HEADER -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">
      ยินดีต้อนรับ 👋
    </h1>
    <p class="text-gray-400 text-sm">
      กรุณาเลือกประเภทผู้ใช้งาน
    </p>
  </div>

  <!-- CARD SELECT -->
  <div class="grid grid-cols-2 gap-4">

    <!-- STUDENT -->
    <div onclick="goStudent()" 
         class="bg-white rounded-2xl p-5 text-center shadow hover:shadow-lg transition cursor-pointer border">

      <div class="bg-green-100 w-16 h-16 mx-auto rounded-xl flex items-center justify-center mb-3">
        🎓
      </div>

      <h2 class="font-bold text-gray-700 mb-2">นักเรียน</h2>

      <button class="bg-green-500 text-white px-4 py-2 rounded-lg text-sm">
        เข้าระบบ
      </button>

      <p class="text-xs text-gray-400 mt-2">
        เช็คชื่อ / ส่งงาน
      </p>
    </div>

    <!-- TEACHER -->
    <div onclick="goTeacher()" 
         class="bg-white rounded-2xl p-5 text-center shadow hover:shadow-lg transition cursor-pointer border">

      <div class="bg-blue-100 w-16 h-16 mx-auto rounded-xl flex items-center justify-center mb-3">
        👨‍🏫
      </div>

      <h2 class="font-bold text-gray-700 mb-2">ครู</h2>

      <button class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm">
        เข้าระบบ
      </button>

      <p class="text-xs text-gray-400 mt-2">
        จัดการระบบ / รายงาน
      </p>
    </div>

  </div>

</div>

<script>
function goStudent(){
  window.location.href = "Student.html";
}

function goTeacher(){
  window.location.href = "Teacher.html";
}
</script>

</body>
</html>
