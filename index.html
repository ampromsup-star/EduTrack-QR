<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<!-- update -->
<body class="p-4 bg-gray-100">

<h1 class="text-xl font-bold mb-4">EduTrack QR</h1>

<input id="user" placeholder="user" class="border p-2 w-full mb-2">
<input id="pass" type="password" placeholder="pass" class="border p-2 w-full mb-2">

<button onclick="login()" class="bg-blue-500 text-white p-2 w-full">Login</button>

<div id="scan" class="hidden mt-4">
  <div id="reader"></div>
  <div id="result" class="mt-2"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzgFMO18sFeryMySR20s7vzLD4umlRe_UUjzmFl0tf2vheQQU8e5qWc7h9OvEO-zDRo/exec";

async function api(action,data){
  const res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({action,data})
  });
  return await res.json();
}

let qr;

async function login(){
  const u = user.value;
  const p = pass.value;

  const res = await api("login",{u,p});

  if(res.status==="ok"){
    document.getElementById("scan").classList.remove("hidden");
    startScan();
  } else {
    alert("login fail");
  }
}

async function startScan(){
  qr = new Html5Qrcode("reader");

  const cams = await Html5Qrcode.getCameras();
  const camId = cams[0].id;

  qr.start(camId,{fps:10,qrbox:250},onScan);
}

async function onScan(text){
  qr.pause();

  const res = await api("scan",text);

  if(res.status==="ok"){
    document.getElementById("result").innerHTML =
      res.name + "<br><button onclick='save(\"มา\")'>มา</button>";
    window.current = res;
  } else {
    alert(res.message);
    qr.resume();
  }
}

async function save(status){
  await api("save",{
    id:current.id,
    name:current.name,
    class:current.class,
    status
  });

  alert("saved");
  qr.resume();
}
</script>

</body>
</html>
