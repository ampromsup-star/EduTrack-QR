<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
  font-family: 'Sarabun', sans-serif;
  background: linear-gradient(135deg,#eef2ff,#ffffff);
}
.card{
  @apply bg-white rounded-2xl p-6 text-center shadow-md hover:shadow-xl transition cursor-pointer;
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div class="w-full max-w-md p-6">

  <!-- HEADER -->
  <h1 class="text-2xl font-bold text-gray-800 mb-1">
    ยินดีต้อนรับ 👋
  </h1>
  <p class="text-gray-400 mb-6">กรุณาเลือกประเภทผู้ใช้งาน</p>

  <!-- ROLE -->
  <div class="grid grid-cols-2 gap-4">

    <!-- STUDENT -->
    <div class="card" onclick="openLogin('student')">
      <div class="bg-green-100 w-16 h-16 mx-auto rounded-xl flex items-center justify-center mb-3 text-2xl">🎓</div>
      <h2 class="font-bold">นักเรียน</h2>
      <button class="mt-2 bg-green-500 text-white px-4 py-2 rounded-lg">เข้าสู่ระบบ</button>
      <p class="text-xs text-gray-400 mt-2">เช็คชื่อ / ส่งงาน</p>
    </div>

    <!-- TEACHER -->
    <div class="card" onclick="openLogin('teacher')">
      <div class="bg-blue-100 w-16 h-16 mx-auto rounded-xl flex items-center justify-center mb-3 text-2xl">👨‍🏫</div>
      <h2 class="font-bold">ครู</h2>
      <button class="mt-2 bg-blue-500 text-white px-4 py-2 rounded-lg">เข้าสู่ระบบ</button>
      <p class="text-xs text-gray-400 mt-2">จัดการระบบ / รายงาน</p>
    </div>

  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxU8I2GPjhmkNesZwwZKSlLXlu2aKOb6mUpAjE_3WEtZekNTscUAV75OUR5lpSV4IKLVA/exec";

// เปิด Login
function openLogin(role){
  Swal.fire({
    title: role === 'student' ? 'เข้าสู่ระบบนักเรียน' : 'เข้าสู่ระบบครู',
    html: `
      <input id="user" class="swal2-input" placeholder="Username">
      <input id="pass" type="password" class="swal2-input" placeholder="Password">
    `,
    confirmButtonText:'เข้าสู่ระบบ',
    preConfirm: async () => {
      const username = document.getElementById('user').value;
      const password = document.getElementById('pass').value;

      const res = await fetch(API,{
        method:'POST',
        body: JSON.stringify({
          action:'login',
          data:{username,password}
        })
      });

      const data = await res.json();

      if(data.status==='success'){
        if(data.role==='teacher'){
          window.location = "Teacher.html";
        }else{
          localStorage.setItem('student', JSON.stringify(data));
          window.location = "Student.html";
        }
      }else{
        Swal.showValidationMessage('ข้อมูลไม่ถูกต้อง');
      }
    }
  });
}
</script>

</body>
</html>
