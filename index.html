<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
  font-family: 'Sarabun', sans-serif;
}

/* พื้นหลัง */
.hero {
  background: url('https://images.unsplash.com/photo-1523240795612-9a054b0db644') center/cover;
}

/* กล่องลอย */
.floating-card{
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.9);
}
</style>

</head>

<body class="h-screen flex flex-col">

<!-- 🔶 HERO TOP -->
<div class="hero h-[55%] relative">

  <!-- overlay มืด -->
  <div class="absolute inset-0 bg-black/30"></div>

  <!-- Title -->
  <div class="absolute bottom-6 left-6 text-white">
    <h1 class="text-3xl font-bold">EduTrack QR</h1>
    <p class="text-sm opacity-80">ระบบเช็คชื่ออัจฉริยะ</p>
  </div>

</div>

<!-- 🔷 FLOATING CARD -->
<div class="flex-1 -mt-10 px-4">

  <div class="floating-card rounded-3xl p-6 shadow-2xl max-w-md mx-auto">

    <h2 class="text-xl font-bold mb-1">ยินดีต้อนรับ 👋</h2>
    <p class="text-gray-400 text-sm mb-5">กรุณาเลือกประเภทผู้ใช้งาน</p>

    <div class="grid grid-cols-2 gap-4">

      <!-- STUDENT -->
      <div onclick="openLogin('student')" 
           class="bg-white rounded-2xl p-4 text-center shadow hover:scale-105 transition cursor-pointer">

        <div class="bg-green-100 w-14 h-14 mx-auto rounded-xl flex items-center justify-center text-2xl mb-2">
          🎓
        </div>

        <h3 class="font-bold text-gray-700">นักเรียน</h3>

        <button class="mt-2 bg-green-500 text-white px-3 py-1 rounded-lg text-sm">
          เข้าระบบ
        </button>

        <p class="text-xs text-gray-400 mt-1">เช็คชื่อ / ส่งงาน</p>
      </div>

      <!-- TEACHER -->
      <div onclick="openLogin('teacher')" 
           class="bg-white rounded-2xl p-4 text-center shadow hover:scale-105 transition cursor-pointer">

        <div class="bg-blue-100 w-14 h-14 mx-auto rounded-xl flex items-center justify-center text-2xl mb-2">
          👨‍🏫
        </div>

        <h3 class="font-bold text-gray-700">ครู</h3>

        <button class="mt-2 bg-blue-500 text-white px-3 py-1 rounded-lg text-sm">
          เข้าระบบ
        </button>

        <p class="text-xs text-gray-400 mt-1">จัดการ / รายงาน</p>
      </div>

    </div>

  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwfpPyWhrV4Pv2P-cACE9-a774qmSakpCPW1ee7MnX8YnbwUAoluo4rN0bazluWF1cxFQ/exec";

// 🔐 LOGIN POPUP
function openLogin(role){
  Swal.fire({
    title: role === 'student' ? 'เข้าสู่ระบบนักเรียน' : 'เข้าสู่ระบบครู',
    html: `
      <input id="user" class="swal2-input" placeholder="Username">
      <input id="pass" type="password" class="swal2-input" placeholder="Password">
    `,
    confirmButtonText:'เข้าสู่ระบบ',
    preConfirm: async () => {
      const username = document.getElementById('user').value;
      const password = document.getElementById('pass').value;

      const res = await fetch(API,{
        method:'POST',
        body: JSON.stringify({
          action:'login',
          data:{username,password}
        })
      });

      const data = await res.json();

      if(data.status==='success'){
        if(data.role==='teacher'){
          window.location = "Teacher.html";
        }else{
          localStorage.setItem('student', JSON.stringify(data));
          window.location = "Student.html";
        }
      }else{
        Swal.showValidationMessage('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
      }
    }
  });
}
</script>

</body>
</html>
